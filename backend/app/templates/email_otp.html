<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #1a1a2e; }
        .container { max-width: 480px; margin: 0 auto; padding: 32px; }
        .header { text-align: center; margin-bottom: 32px; }
        .logo { font-size: 24px; font-weight: bold; color: #0F172A; }
        .code-box { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 12px; padding: 24px; text-align: center; margin: 24px 0; }
        .code { font-size: 36px; font-weight: bold; letter-spacing: 8px; color: #0F172A; }
        .warning { font-size: 12px; color: #64748b; text-align: center; margin-top: 16px; }
        .footer { text-align: center; font-size: 12px; color: #94a3b8; margin-top: 32px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">CodeLab</div>
        </div>
        <p>Hello,</p>
        <p>Your verification code is:</p>
        <div class="code-box">
            <div class="code">{otp_code}</div>
        </div>
        <p class="warning">This code expires in 10 minutes. Do not share this code with anyone.</p>
        <div class="footer">
            <p>If you didn't request this code, please ignore this email.</p>
        </div>
    </div>
</body>
</html>
